name: Build Flutter Apps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Get Dependencies
        working-directory: aira_perpus
        run: flutter pub get

      - name: Ensure Windows Platform Folder Exists
        working-directory: aira_perpus
        shell: pwsh
        run: |
          if (-not (Test-Path "windows")) {
            Write-Host "Windows folder is missing. Recreating via flutter create..."
            flutter create --platforms=windows .
          }

      - name: Build Windows (Release)
        working-directory: aira_perpus
        run: flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aira-perpus-windows-app
          path: |
            aira_perpus/build/windows/x64/runner/Release/
            aira_perpus/build/windows/runner/Release/
          if-no-files-found: warn

  build-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Web Support
        run: flutter config --enable-web

      - name: Get Dependencies
        working-directory: aira_perpus
        run: flutter pub get

      - name: Ensure Web Platform Folder Exists
        working-directory: aira_perpus
        run: |
          if [ ! -d "web" ]; then
            echo "Web folder is missing. Recreating via flutter create..."
            flutter create --platforms=web .
          fi

      - name: Build Web (Release)
        working-directory: aira_perpus
        run: flutter build web --release --web-renderer html --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aira-perpus-web-app
          path: aira_perpus/build/web/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: aira_perpus/build/web
