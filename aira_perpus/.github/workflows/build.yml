name: Build Windows App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Get Dependencies
        working-directory: aira_perpus
        run: flutter pub get

      - name: Ensure Windows Platform Folder Exists
        working-directory: aira_perpus
        shell: pwsh
        run: |
          if (-not (Test-Path "windows")) {
            Write-Host "Windows folder is missing. Recreating via flutter create..."
            flutter create --platforms=windows .
          }

      - name: Build Windows (Release)
        working-directory: aira_perpus
        run: flutter build windows --release

      - name: Compress Windows Build
        working-directory: aira_perpus/build/windows/runner/Release
        shell: pwsh
        run: Compress-Archive -Path * -DestinationPath ../../../AiraPerpus-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiraPerpus-Windows-Installer
          path: aira_perpus/build/windows/runner/AiraPerpus-Windows.zip